# .air.toml — Hot-reload config for local Go development
# Install: go install github.com/cosmtrek/air@latest

root = "."
tmp_dir = "tmp"

[build]
  cmd           = "go build -o ./tmp/main ./cmd/server/main.go"
  bin           = "./tmp/main"
  full_bin      = "./tmp/main"
  include_ext   = ["go", "tpl", "tmpl", "html", "env"]
  exclude_dir   = ["assets", "tmp", "vendor", "node_modules", "docs"]
  exclude_file  = []
  exclude_regex = ["_test\\.go"]
  delay         = 1000           # ms before rebuild triggers
  stop_on_error = true
  log           = "build-errors.log"

[log]
  time = true

[color]
  main    = "magenta"
  watcher = "cyan"
  build   = "yellow"
  runner  = "green"

[misc]
  clean_on_exit = true
