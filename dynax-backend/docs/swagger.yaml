basePath: /api/v1
definitions:
  models.AIConversation:
    properties:
      created_at:
        type: string
      id:
        type: string
      input:
        type: string
      response:
        type: string
      user_id:
        type: string
      user_role:
        type: string
    type: object
  models.AIQueryRequest:
    properties:
      context:
        description: patient_id context for richer AI
        type: string
      conversation_id:
        type: string
      input:
        maxLength: 5000
        minLength: 3
        type: string
    required:
    - input
    type: object
  models.AdminStats:
    properties:
      active_care_plans:
        type: integer
      pending_approvals:
        type: integer
      sessions_this_month:
        type: integer
      total_patients:
        type: integer
      total_professionals:
        type: integer
      total_revenue:
        type: number
      total_sessions:
        type: integer
      total_users:
        type: integer
    type: object
  models.Appointment:
    properties:
      completed_at:
        type: string
      created_at:
        type: string
      description:
        type: string
      duration_minutes:
        type: integer
      id:
        type: string
      meeting_url:
        type: string
      notes:
        type: string
      patient_id:
        type: string
      professional_id:
        type: string
      scheduled_at:
        type: string
      session_type:
        description: virtual | in_person
        type: string
      status:
        description: scheduled | completed | cancelled | no_show
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
  models.ApproveProfessionalRequest:
    properties:
      is_approved:
        type: boolean
      notes:
        type: string
    required:
    - is_approved
    type: object
  models.AssignProfessionalRequest:
    properties:
      patient_id:
        type: string
      professional_id:
        type: string
      role:
        type: string
    required:
    - patient_id
    - professional_id
    - role
    type: object
  models.AuthResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      profile:
        $ref: '#/definitions/models.Profile'
      refresh_token:
        type: string
      token_type:
        type: string
      user:
        $ref: '#/definitions/models.User'
    type: object
  models.CarePlan:
    properties:
      created_at:
        type: string
      description:
        type: string
      end_date:
        type: string
      goals:
        items:
          type: string
        type: array
      id:
        type: string
      patient_id:
        type: string
      professional_id:
        type: string
      progress_notes:
        type: string
      start_date:
        type: string
      status:
        description: active | completed | paused | cancelled
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
  models.ChangePasswordRequest:
    properties:
      current_password:
        type: string
      new_password:
        minLength: 8
        type: string
    required:
    - current_password
    - new_password
    type: object
  models.ClinicalNote:
    properties:
      content:
        type: string
      created_at:
        type: string
      diagnosis_codes:
        items:
          type: string
        type: array
      id:
        type: string
      is_confidential:
        type: boolean
      note_type:
        description: soap | progress | assessment | referral
        type: string
      patient_id:
        type: string
      professional_id:
        type: string
      session_id:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
  models.ConnectToProfessionalRequest:
    properties:
      professional_code:
        type: string
    required:
    - professional_code
    type: object
  models.Conversation:
    properties:
      admin_id:
        type: string
      created_at:
        type: string
      id:
        type: string
      last_message:
        type: string
      last_message_at:
        type: string
      patient_id:
        type: string
      professional_id:
        type: string
      unread_count:
        type: integer
    type: object
  models.CreateAppointmentRequest:
    properties:
      description:
        type: string
      duration_minutes:
        maximum: 480
        minimum: 15
        type: integer
      meeting_url:
        type: string
      patient_id:
        type: string
      scheduled_at:
        type: string
      session_type:
        enum:
        - virtual
        - in_person
        type: string
      title:
        maxLength: 200
        minLength: 3
        type: string
    required:
    - duration_minutes
    - patient_id
    - scheduled_at
    - session_type
    - title
    type: object
  models.CreateCarePlanRequest:
    properties:
      description:
        type: string
      end_date:
        type: string
      goals:
        items:
          type: string
        type: array
      patient_id:
        type: string
      start_date:
        type: string
      title:
        maxLength: 200
        minLength: 3
        type: string
    required:
    - patient_id
    - start_date
    - title
    type: object
  models.CreateClinicalNoteRequest:
    properties:
      content:
        minLength: 10
        type: string
      diagnosis_codes:
        items:
          type: string
        type: array
      is_confidential:
        type: boolean
      note_type:
        enum:
        - soap
        - progress
        - assessment
        - referral
        type: string
      patient_id:
        type: string
      session_id:
        type: string
      title:
        maxLength: 200
        minLength: 3
        type: string
    required:
    - content
    - note_type
    - patient_id
    - title
    type: object
  models.CreateDeviceMeasurementRequest:
    properties:
      body_region:
        type: string
      device_type:
        type: string
      measurements: {}
      notes:
        type: string
      patient_id:
        type: string
    required:
    - body_region
    - device_type
    - measurements
    - patient_id
    type: object
  models.CreateSessionRequest:
    properties:
      appointment_id:
        type: string
      assessment_note:
        type: string
      duration_minutes:
        minimum: 5
        type: integer
      objective_note:
        type: string
      patient_id:
        type: string
      plan_note:
        type: string
      session_date:
        type: string
      session_type:
        enum:
        - virtual
        - in_person
        type: string
      subjective_note:
        type: string
    required:
    - duration_minutes
    - patient_id
    - session_date
    - session_type
    type: object
  models.CreateTherapayRequest:
    properties:
      installment_amount:
        type: number
      installment_interval:
        type: string
      patient_id:
        type: string
      plan_type:
        enum:
        - session
        - bundle
        - subscription
        - installment
        type: string
      sessions_total:
        type: integer
      total_amount:
        type: number
    required:
    - patient_id
    - plan_type
    - total_amount
    type: object
  models.DeviceMeasurement:
    properties:
      body_region:
        type: string
      created_at:
        type: string
      device_type:
        type: string
      id:
        type: string
      measurements:
        description: JSONB
      notes:
        type: string
      patient_id:
        type: string
      professional_id:
        type: string
      status:
        description: draft | submitted | approved | fabricating | delivered
        type: string
      updated_at:
        type: string
    type: object
  models.ForgotPasswordRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  models.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  models.Message:
    properties:
      content:
        type: string
      conversation_id:
        type: string
      created_at:
        type: string
      file_name:
        type: string
      file_url:
        type: string
      id:
        type: string
      is_read:
        type: boolean
      read_at:
        type: string
      sender_id:
        type: string
      sender_type:
        description: patient | professional | admin
        type: string
    type: object
  models.Notification:
    properties:
      body:
        type: string
      created_at:
        type: string
      data: {}
      id:
        type: string
      is_read:
        type: boolean
      read_at:
        type: string
      title:
        type: string
      type:
        type: string
      user_id:
        type: string
    type: object
  models.PatientProfile:
    properties:
      address:
        type: string
      assigned_professional_id:
        type: string
      condition:
        type: string
      created_at:
        type: string
      date_of_birth:
        type: string
      diagnosis_notes:
        type: string
      email:
        type: string
      emergency_contact:
        type: string
      full_name:
        type: string
      gender:
        type: string
      id:
        type: string
      personal_code:
        type: string
      phone_number:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  models.ProfessionalConnection:
    properties:
      connected_at:
        type: string
      id:
        type: string
      patient_id:
        type: string
      professional_id:
        type: string
      status:
        type: string
    type: object
  models.ProfessionalProfile:
    properties:
      approval_status:
        type: string
      avatar_url:
        type: string
      bio:
        type: string
      clinic_code:
        type: string
      clinic_name:
        type: string
      created_at:
        type: string
      credentials:
        type: string
      email:
        type: string
      experience_years:
        type: integer
      full_name:
        type: string
      id:
        type: string
      in_person_sessions_enabled:
        type: boolean
      is_approved:
        type: boolean
      license_number:
        type: string
      license_type:
        type: string
      personal_code:
        type: string
      phone_number:
        type: string
      professional_type:
        type: string
      session_rate:
        type: number
      specializations:
        items:
          type: string
        type: array
      updated_at:
        type: string
      user_id:
        type: string
      virtual_sessions_enabled:
        type: boolean
    type: object
  models.Profile:
    properties:
      address:
        type: string
      avatar_url:
        type: string
      city:
        type: string
      country:
        type: string
      created_at:
        type: string
      date_of_birth:
        type: string
      full_name:
        type: string
      gender:
        type: string
      id:
        type: string
      personal_code:
        type: string
      phone_number:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  models.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  models.RegisterRequest:
    properties:
      email:
        type: string
      full_name:
        maxLength: 100
        minLength: 2
        type: string
      password:
        minLength: 8
        type: string
      role:
        allOf:
        - $ref: '#/definitions/models.Role'
        enum:
        - patient
        - physiotherapist
        - prosthetist
        - orthotist
        - occupational_therapist
        - speech_therapist
        - mental_health_clinician
    required:
    - email
    - full_name
    - password
    - role
    type: object
  models.ResetPasswordRequest:
    properties:
      password:
        minLength: 8
        type: string
      token:
        type: string
    required:
    - password
    - token
    type: object
  models.Role:
    enum:
    - admin
    - prosthetist
    - orthotist
    - physiotherapist
    - occupational_therapist
    - speech_therapist
    - mental_health_clinician
    - patient
    type: string
    x-enum-varnames:
    - RoleAdmin
    - RoleProsthetist
    - RoleOrthotist
    - RolePhysiotherapist
    - RoleOccupationalTherapist
    - RoleSpeechTherapist
    - RoleMentalHealthClinician
    - RolePatient
  models.SendMessageRequest:
    properties:
      content:
        maxLength: 5000
        minLength: 1
        type: string
      file_name:
        type: string
      file_url:
        type: string
    required:
    - content
    type: object
  models.TheraPay:
    properties:
      amount_paid:
        type: number
      created_at:
        type: string
      id:
        type: string
      installment_amount:
        type: number
      installment_interval:
        type: string
      next_payment_date:
        type: string
      patient_id:
        type: string
      plan_type:
        description: session | bundle | subscription | installment
        type: string
      professional_id:
        type: string
      sessions_total:
        type: integer
      sessions_used:
        type: integer
      status:
        type: string
      total_amount:
        type: number
      updated_at:
        type: string
    type: object
  models.TherapySession:
    properties:
      appointment_id:
        type: string
      assessment_note:
        type: string
      created_at:
        type: string
      duration_minutes:
        type: integer
      goals_achieved:
        type: boolean
      id:
        type: string
      objective_note:
        type: string
      patient_id:
        type: string
      patient_rating:
        type: integer
      plan_note:
        type: string
      professional_id:
        type: string
      session_date:
        type: string
      session_type:
        type: string
      status:
        type: string
      subjective_note:
        type: string
      updated_at:
        type: string
    type: object
  models.UpdateAppointmentRequest:
    properties:
      description:
        type: string
      duration_minutes:
        type: integer
      meeting_url:
        type: string
      notes:
        type: string
      scheduled_at:
        type: string
      status:
        enum:
        - scheduled
        - completed
        - cancelled
        - no_show
        type: string
      title:
        type: string
    type: object
  models.UpdatePatientProfileRequest:
    properties:
      address:
        type: string
      date_of_birth:
        type: string
      emergency_contact:
        type: string
      full_name:
        maxLength: 100
        minLength: 2
        type: string
      gender:
        type: string
      phone_number:
        type: string
    type: object
  models.UpdateProfessionalProfileRequest:
    properties:
      bio:
        maxLength: 1000
        type: string
      clinic_name:
        type: string
      experience_years:
        type: integer
      full_name:
        maxLength: 100
        minLength: 2
        type: string
      in_person_sessions_enabled:
        type: boolean
      license_number:
        type: string
      phone_number:
        type: string
      session_rate:
        type: number
      specializations:
        items:
          type: string
        type: array
      virtual_sessions_enabled:
        type: boolean
    type: object
  models.User:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      role:
        $ref: '#/definitions/models.Role'
      updated_at:
        type: string
    type: object
  response.APIError:
    properties:
      code:
        type: string
      details: {}
      message:
        type: string
    type: object
  response.Envelope:
    properties:
      data: {}
      error:
        $ref: '#/definitions/response.APIError'
      message:
        type: string
      meta:
        $ref: '#/definitions/response.Meta'
      success:
        type: boolean
    type: object
  response.Meta:
    properties:
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
host: localhost:8080
info:
  contact:
    email: support@dynalimb.com
    name: Dynalimb Technologies
    url: https://dynalimb.com
  description: Rehabilitation & Prosthetic Care Platform — Backend API
  license:
    name: Proprietary
    url: https://dynalimb.com/license
  termsOfService: https://dynalimb.com/terms
  title: DynaX API
  version: "1.0"
paths:
  /admin/analytics:
    get:
      description: Returns platform analytics broken down by time period.
      parameters:
      - description: 'Period: day | week | month | year (default: month)'
        in: query
        name: period
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Get platform analytics
      tags:
      - admin
  /admin/assign:
    post:
      consumes:
      - application/json
      description: Admin-assigns a professional to a patient's care team.
      parameters:
      - description: Assignment data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.AssignProfessionalRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Assign a professional to a patient
      tags:
      - admin
  /admin/audit-logs:
    get:
      description: Returns paginated platform audit logs (admin only).
      parameters:
      - description: Page
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Get audit logs
      tags:
      - admin
  /admin/patients:
    get:
      description: Returns a paginated list of all patients on the platform.
      parameters:
      - description: Page
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: page_size
        type: integer
      - description: Search by name
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/models.PatientProfile'
                  type: array
              type: object
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: List all patients
      tags:
      - admin
  /admin/professionals:
    get:
      description: Returns a paginated list of professionals, optionally filtered
        by approval status.
      parameters:
      - description: Page
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: page_size
        type: integer
      - description: 'Filter by status: pending | approved | rejected'
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/models.ProfessionalProfile'
                  type: array
              type: object
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: List professionals
      tags:
      - admin
  /admin/professionals/{professional_id}/approve:
    post:
      consumes:
      - application/json
      description: Approves or rejects a professional's registration (triggers email
        notification).
      parameters:
      - description: Professional UUID
        in: path
        name: professional_id
        required: true
        type: string
      - description: Approval decision
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.ApproveProfessionalRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/models.ProfessionalProfile'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Approve or reject a professional
      tags:
      - admin
  /admin/stats:
    get:
      description: Returns high-level platform statistics (admin only).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/models.AdminStats'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Envelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Platform statistics
      tags:
      - admin
  /admin/users:
    get:
      description: Returns a paginated list of all platform users.
      parameters:
      - description: Page
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: page_size
        type: integer
      - description: Search by email or name
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/models.User'
                  type: array
              type: object
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: List all users
      tags:
      - admin
  /admin/users/{user_id}/deactivate:
    post:
      description: Disables a user's account, preventing login.
      parameters:
      - description: User UUID
        in: path
        name: user_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Deactivate user account
      tags:
      - admin
  /admin/users/{user_id}/reactivate:
    post:
      description: Re-enables a previously deactivated user account.
      parameters:
      - description: User UUID
        in: path
        name: user_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Reactivate user account
      tags:
      - admin
  /ai/conversations/{conversation_id}:
    delete:
      description: Permanently deletes an AI conversation thread and all its messages.
      parameters:
      - description: Conversation UUID
        in: path
        name: conversation_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Delete an AI conversation
      tags:
